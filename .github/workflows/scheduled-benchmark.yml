name: Scheduled benchmark

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install Ollama and pull benchmark model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma3:4b

      - name: Run scheduled benchmark and persist to the metrics DB
        run: uv run python scripts/scheduled_benchmark.py

      - name: Commit updated metrics DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metrics.db
          git diff --staged --quiet || git commit -m "chore: scheduled benchmark run [skip ci]"
          git push
