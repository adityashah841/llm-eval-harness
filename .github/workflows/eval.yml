name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install Ollama and pull smallest model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma3:4b

      - name: Run smoke test (2 samples, gemma3:4b only)
        run: |
          uv run python scripts/run_eval.py \
            --dataset datasets/legal_qa \
            --models gemma3:4b \
            --smoke-test \
            --no-mlflow \
            --output outputs/ci_results.csv

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: outputs/ci_results.csv

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run API tests
        run: uv run pytest tests/test_api.py -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: [eval-smoke-test, backend-tests, frontend-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for AWS OIDC role assumption
      contents: read
    env:
      AWS_REGION: us-east-1
      ECR_API_REPO: llm-eval-harness/api
      ECR_FRONTEND_REPO: llm-eval-harness/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Skip if AWS deploy role isn't configured
        id: gate
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN secret not set — skipping deploy. See README#deployment-aws for setup."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.gate.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.gate.outputs.configured == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        if: steps.gate.outputs.configured == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -f api/Dockerfile -t "$REGISTRY/$ECR_API_REPO:${{ github.sha }}" -t "$REGISTRY/$ECR_API_REPO:latest" .
          docker push "$REGISTRY/$ECR_API_REPO:${{ github.sha }}"
          docker push "$REGISTRY/$ECR_API_REPO:latest"

      - name: Build and push frontend image
        if: steps.gate.outputs.configured == 'true'
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="${{ secrets.API_PUBLIC_URL }}" \
            -t "$REGISTRY/$ECR_FRONTEND_REPO:${{ github.sha }}" \
            -t "$REGISTRY/$ECR_FRONTEND_REPO:latest" \
            frontend
          docker push "$REGISTRY/$ECR_FRONTEND_REPO:${{ github.sha }}"
          docker push "$REGISTRY/$ECR_FRONTEND_REPO:latest"

      - name: Redeploy App Runner services
        if: steps.gate.outputs.configured == 'true'
        run: |
          aws apprunner start-deployment --service-arn "${{ secrets.AWS_APPRUNNER_API_SERVICE_ARN }}"
          aws apprunner start-deployment --service-arn "${{ secrets.AWS_APPRUNNER_FRONTEND_SERVICE_ARN }}"
