name: Smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install Ollama and pull smallest model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma3:4b

      - name: Run smoke test (2 samples, gemma3:4b only)
        run: |
          uv run python scripts/run_eval.py \
            --dataset datasets/legal_qa \
            --models gemma3:4b \
            --smoke-test \
            --no-mlflow \
            --output outputs/ci_results.csv

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: outputs/ci_results.csv
